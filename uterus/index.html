<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Вибір положення матки</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-live="polite">
      <section id="gallery-view" class="view">
        <h1>Оберіть положення</h1>
        <div class="gallery" id="gallery"></div>
      </section>

      <section id="detail-view" class="view detail" hidden>
        <a class="back-link" href="./" aria-label="Повернутися до списку зображень">← Назад до вибору</a>
        <div class="detail-workspace">
          <section class="report-panel" aria-label="Дані пацієнтки та матки">
            <div class="myoma-panel-header">
              <h2>Дані для звіту</h2>
            </div>
            <div class="report-grid">
              <label class="field-label">ПІБ
                <input id="patient-name" class="report-input" type="text" placeholder="ПІБ пацієнтки" />
              </label>
              <label class="field-label">Положення матки
                <input id="uterus-position" class="report-input" type="text" readonly />
              </label>
              <label class="field-label">Розміри матки, мм
                <input id="uterus-size" class="report-input" type="text" placeholder="довжина × передньо-задній × ширина" />
              </label>
              <label class="field-label">Ендометрій, мм
                <input id="endometrium-size" class="report-input" type="text" placeholder="товщина М-ехо" />
              </label>
              <label class="field-label report-grid-wide">Додатково важливе
                <textarea id="additional-notes" class="report-textarea" rows="3" placeholder="Аденоміоз, деформація порожнини, рідина, шийка матки тощо"></textarea>
              </label>
            </div>
          </section>

          <div class="detail-layout" aria-label="Відкрите зображення та еталонне зображення матки">
            <figure class="detail-card">
              <div class="image-stage" data-marker-surface="selected">
                <img id="detail-image" src="" alt="" />
              </div>
              <figcaption class="detail-card-actions">
                <button class="download-image-button" type="button" data-download-surface="selected">Зберегти зображення 1</button>
              </figcaption>
            </figure>
            <figure class="detail-card detail-card-reference">
              <div class="image-stage" data-marker-surface="reference">
                <img id="reference-image" src="uterus.png" alt="Еталонне зображення матки" />
              </div>
              <figcaption class="detail-card-actions">
                <button class="download-image-button" type="button" data-download-surface="reference">Зберегти зображення 2</button>
              </figcaption>
            </figure>
          </div>

          <section class="myoma-panel" aria-label="Міоми">
            <div class="myoma-panel-header">
              <h2>Міоми / FIGO</h2>
              <button class="add-myoma-button" type="button" id="add-myoma" aria-label="Додати міому">+</button>
            </div>

            <div class="myoma-table-wrap">
              <table class="myoma-table">
                <thead>
                  <tr>
                    <th scope="col">№</th>
                    <th scope="col">FIGO</th>
                    <th scope="col">Розмір, мм</th>
                    <th scope="col">Локалізація / ураження</th>
                    <th scope="col">Колір</th>
                    <th scope="col">Дії</th>
                  </tr>
                </thead>
                <tbody id="myoma-list"></tbody>
              </table>
            </div>
          </section>

          <section class="myoma-panel" aria-label="Утвори">
            <div class="myoma-panel-header">
              <h2>Інші ураження</h2>
              <button class="add-myoma-button" type="button" id="add-formation" aria-label="Додати утвір">+</button>
            </div>

            <div class="myoma-table-wrap">
              <table class="myoma-table">
                <thead>
                  <tr>
                    <th scope="col">№</th>
                    <th scope="col">Назва</th>
                    <th scope="col">Розмір, мм</th>
                    <th scope="col">Локалізація / опис</th>
                    <th scope="col">Колір</th>
                    <th scope="col">Дії</th>
                  </tr>
                </thead>
                <tbody id="formation-list"></tbody>
              </table>
            </div>
          </section>

          <section class="myoma-panel" aria-label="Яєчники">
            <div class="myoma-panel-header"><h2>Яєчники</h2></div>
            <div class="ovary-grid">
              <fieldset class="ovary-card" data-ovary="right">
                <legend>Правий яєчник</legend>
                <label class="field-label">Розмір, мм <input id="right-ovary-size" class="report-input" type="text" placeholder="довжина × ширина × товщина" /></label>
                <label class="field-label">Оцінка
                  <select id="right-ovary-status" class="report-input"><option value="">Не вказувати</option><option>Норма</option><option>Не норма</option><option>Не візуалізується</option></select>
                </label>
                <label class="checkbox-label"><input id="right-endometriosis" type="checkbox" /> Ознаки ендометріозу</label>
                <div class="checkbox-group" aria-label="Типові локалізації праворуч">
                  <label><input type="checkbox" name="right-endo-location" value="ендометріома" /> ендометріома</label>
                  <label><input type="checkbox" name="right-endo-location" value="періоваріальні спайки" /> періоваріальні спайки</label>
                  <label><input type="checkbox" name="right-endo-location" value="матково-крижова зв’язка" /> матково-крижова зв’язка</label>
                  <label><input type="checkbox" name="right-endo-location" value="дугласів простір" /> дугласів простір</label>
                </div>
                <textarea id="right-ovary-notes" class="report-textarea" rows="2" placeholder="Опис вручну"></textarea>
              </fieldset>
              <fieldset class="ovary-card" data-ovary="left">
                <legend>Лівий яєчник</legend>
                <label class="field-label">Розмір, мм <input id="left-ovary-size" class="report-input" type="text" placeholder="довжина × ширина × товщина" /></label>
                <label class="field-label">Оцінка
                  <select id="left-ovary-status" class="report-input"><option value="">Не вказувати</option><option>Норма</option><option>Не норма</option><option>Не візуалізується</option></select>
                </label>
                <label class="checkbox-label"><input id="left-endometriosis" type="checkbox" /> Ознаки ендометріозу</label>
                <div class="checkbox-group" aria-label="Типові локалізації ліворуч">
                  <label><input type="checkbox" name="left-endo-location" value="ендометріома" /> ендометріома</label>
                  <label><input type="checkbox" name="left-endo-location" value="періоваріальні спайки" /> періоваріальні спайки</label>
                  <label><input type="checkbox" name="left-endo-location" value="матково-крижова зв’язка" /> матково-крижова зв’язка</label>
                  <label><input type="checkbox" name="left-endo-location" value="дугласів простір" /> дугласів простір</label>
                </div>
                <textarea id="left-ovary-notes" class="report-textarea" rows="2" placeholder="Опис вручну"></textarea>
              </fieldset>
            </div>
          </section>

          <section class="report-panel" aria-label="Формування звіту">
            <div class="myoma-panel-header">
              <h2>Звіт</h2>
              <button class="download-image-button" type="button" id="generate-report">Сформувати звіт</button>
            </div>
            <textarea id="report-output" class="report-output" rows="12" placeholder="Тут з’явиться сформований звіт"></textarea>
          </section>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
